<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="form.css">
    <link rel="shortcut icon" href="imagens/account.png" type="image/x-icon">
    <title>Acessar conta</title>
</head>

<body>
    <div class="div-1">
        <img src="imagens/account.png" alt="conta">
        <h1>Acesse sua conta na Elit Cars</h1>

        <form action="">
            <label for="" class="email">Digite seu E-mail</label>
            <br>
            <input type="email" placeholder="Digite seu E-mail Pessoal" required class="input-Email">
            <br><br>
            <label for="" class="Senha">Senha</label>
            <br>
            <input type="password" placeholder="Digite sua senha" required class="input-senha">
            <br><br><br>
            <input type="submit" value="Acessar" class="Input-submit">
        </form>
    </div>

</body>

</html>
